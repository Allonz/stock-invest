<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>补填任务 - Stock Invest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .status-PENDING { color: #d69e2e; font-weight: 600; }
        .status-IN_PROGRESS { color: #3182ce; font-weight: 600; }
        .status-COMPLETED { color: #38a169; font-weight: 600; }
        .status-FAILED { color: #e53e3e; font-weight: 600; }
        .stat-number { font-size: 1.6rem; font-weight: 700; color: #2c5282; }
    </style>
</head>
<body>
<div class="container-fluid py-4">
    <nav class="mb-4">
        <a th:href="@{/page/bars}" class="btn btn-sm btn-outline-secondary me-2">日线数据</a>
        <a th:href="@{/page/screening}" class="btn btn-sm btn-outline-secondary me-2">筛选结果</a>
        <a th:href="@{/page/fill-tasks}" class="btn btn-sm btn-outline-primary">补填任务</a>
    </nav>

    <h4 class="mb-3">🔄 数据补填任务</h4>

    <!-- Stats -->
    <div class="row mb-4">
        <div class="col-md-2">
            <div class="card text-center p-3">
                <div class="text-muted small">总计</div>
                <div class="stat-number" th:text="${#lists.size(tasks)}">0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3">
                <div class="text-muted small">⏳ 待执行</div>
                <div class="stat-number" th:text="${countPending}">0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3">
                <div class="text-muted small">🔄 执行中</div>
                <div class="stat-number" th:text="${countInProgress}">0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3">
                <div class="text-muted small">✅ 已完成</div>
                <div class="stat-number" th:text="${countCompleted}">0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3">
                <div class="text-muted small">❌ 失败</div>
                <div class="stat-number" th:text="${countFailed}">0</div>
            </div>
        </div>
    </div>

    <!-- Filter -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <form method="get" th:action="@{/page/fill-tasks}" class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">状态筛选</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">-- 全部 --</option>
                        <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">待执行</option>
                        <option value="IN_PROGRESS" th:selected="${selectedStatus == 'IN_PROGRESS'}">执行中</option>
                        <option value="COMPLETED" th:selected="${selectedStatus == 'COMPLETED'}">已完成</option>
                        <option value="FAILED" th:selected="${selectedStatus == 'FAILED'}">失败</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-primary btn-sm w-100">筛选</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tasks Table -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>股票代码</th>
                    <th>缺失日期</th>
                    <th>状态</th>
                    <th>重试次数</th>
                    <th>持续天数</th>
                    <th>错误信息</th>
                    <th>创建时间</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tasks)}">
                    <td colspan="8" class="text-center text-muted py-3">暂无补填任务</td>
                </tr>
                <tr th:each="task, stat : ${tasks}">
                    <td th:text="${stat.count}">1</td>
                    <td><strong th:text="${task.symbol}">AAPL</strong></td>
                    <td th:text="${task.missingDate}">2026-01-01</td>
                    <td>
                        <span th:text="${task.status == 'PENDING' ? '⏳ 待执行' : 
                                        task.status == 'IN_PROGRESS' ? '🔄 执行中' : 
                                        task.status == 'COMPLETED' ? '✅ 已完成' : 
                                        '❌ 失败'}"
                              th:class="'status-' + ${task.status}">
                            待执行
                        </span>
                    </td>
                    <td th:text="${task.retryCount}">0</td>
                    <td th:text="${task.persistentDays != null ? task.persistentDays : '--'}">--</td>
                    <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                        th:text="${task.errorMessage != null ? task.errorMessage : '--'}">--</td>
                    <td th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd HH:mm')}">--</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
